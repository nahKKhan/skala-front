<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[과제]회원가입</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Hibur+Mono&family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
</head>

<body class="log-body">
    <div class="signup-container">

        <header>
            <h1>&#128100; 회원가입</h1>
            <p>SKALA-FRONT 회원가입을 환영합니다.</p>
        </header>

        <main>
            <form action="signUpResult.html" method="get">

                <section>
                    <fieldset>
                        <legend>계정 정보</legend>

                        <div class="form-row">
                            <label for="userId">아이디</label>

                            <input
                                type="text"
                                id="userId"
                                name="userId"
                                placeholder="4~15자 영문/숫자"
                                minlength="4"
                                maxlength="15"
                                required
                            >

                            <span class="required-text">(필수)</span>
                        </div>

                        <div class="form-row">
                            <label for="password">비밀번호</label>

                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="8자 이상 입력"
                                minlength="8"
                                required
                            >

                            <span class="required-text">(필수)</span>
                        </div>

                        <div class="form-row">
                            <label for="email">이메일</label>

                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="example@email.com"
                                required
                            >

                            <span class="required-text">(필수)</span>
                        </div>
                    </fieldset>
                </section>

                <section>
                    <fieldset>
                        <legend>개인 프로필 정보</legend>

                        <div class="form-row">
                            <label for="name">이름</label>

                            <input
                                type="text"
                                id="name"
                                name="name"
                                placeholder="이름을 입력하세요"
                                required
                            >
                        </div>

                        <div class="form-row">
                            <label for="birth">생년월일</label>

                            <input
                                type="date"
                                id="birth"
                                name="birth"
                            >
                        </div>

                        <div class="form-row">
                            <span style="width: 130px; color:#510e5e; font-weight: bold;">성별</span>

                            <div class="inline-group">
                                <label>
                                    <input
                                        type="radio"
                                        name="gender"
                                        value="male"
                                    >
                                    남성
                                </label>

                                <label>
                                    <input
                                        type="radio"
                                        name="gender"
                                        value="female"
                                    >
                                    여성
                                </label>

                                <label>
                                    <input
                                        type="radio"
                                        name="gender"
                                        value="none"
                                        checked
                                    >
                                    선택 안 함
                                </label>
                            </div>
                        </div>

                        <div class="form-row">
                            <span style="width: 130px; color:#510e5e; font-weight: bold;">관심 분야</span>

                            <div class="checkbox-group">
                                <label>
                                    <input
                                        type="checkbox"
                                        name="interest"
                                        value="frontend"
                                    >
                                    웹 프론트엔드
                                </label>

                                <label>
                                    <input
                                        type="checkbox"
                                        name="interest"
                                        value="uiux"
                                    >
                                    UI/UX 디자인 표준
                                </label>

                                <label>
                                    <input
                                        type="checkbox"
                                        name="interest"
                                        value="bigdata"
                                    >
                                    빅데이터 &amp; 데이터베이스
                                </label>

                                <label>
                                    <input
                                        type="checkbox"
                                        name="interest"
                                        value="cloud"
                                    >
                                    클라우드 &amp; 인프라
                                </label>
                            </div>
                        </div>

                        <div class="form-row">
                            <label for="path">가입 경로</label>

                            <select id="path" name="path" required>
                                <option value="">선택해 주세요</option>
                                <option value="search">검색</option>
                                <option value="friend">지인 추천</option>
                                <option value="sns">SNS</option>
                                <option value="school">학교 또는 교육기관</option>
                                <option value="etc">기타</option>
                            </select>
                        </div>
                    </fieldset>
                </section>

                <section>
                    <fieldset>
                        <legend>자기소개</legend>

                        <div class="form-row">
                            <label for="introduction">나를 표현하는 <br> 한 줄 소개</label>

                            <textarea
                                id="introduction"
                                name="introduction"
                                placeholder="여기에 나를 소개하는 내용을 작성해 주세요."
                                maxlength="300"
                            ></textarea>
                        </div>
                    </fieldset>
                </section>

                <section class="button-area">
                    <input type="submit" value="회원가입">
                    <input type="reset" value="다시 작성">
                </section>

            </form>
        </main>

        <footer>
            <p><a href="index.html">Home</a></p>
        </footer>

    </div>
</body>
</html>
