<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[과제]회원가입</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #d0baea;
            font-family: Arial, "맑은 고딕", sans-serif;
            color: #222;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
        
        .signup-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 30px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-shadow: 0 5px 15px #746486;
        }

        header {
            margin-bottom: 25px;
        }

        header h1 {
            font-style: italic;
            margin: 0 0 10px;
            font-size: 28px;
        }

        header p {
            margin: 0;
            color: #666;
        }

        section {
            margin-bottom: 24px;
        }

        fieldset {
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        legend {
            padding: 0 10px;
            font-weight: bold;
            font-size: 18px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        .form-row > label {
            width: 130px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="date"],
        select,
        textarea {
            flex: 1;
            min-width: 0;
            padding: 9px 10px;
            border: 1px solid #bbb;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid #9bbcff;
            border-color: #a265ba;
        }

        .required-text {
            margin-left: 8px;
            font-size: 12px;
            color: #777;
        }

        .inline-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            flex: 1;
        }

        .inline-group label {
            font-weight: normal;
        }

        .checkbox-group {
            flex: 1;
        }

        .checkbox-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: normal;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .button-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        input[type="submit"] {
            background-color: #a265ba;
            color: white;
        }

        input[type="reset"] {
            background-color: #ddd;
            color: #222;
        }

        input[type="submit"]:hover {
            background-color: #763b8d;
        }

        input[type="reset"]:hover {
            background-color: #ccc;
        }

        footer {
            margin-top: 20px;
            text-align: center;
            color: #777;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .form-row {
                display: block;
            }

            .form-row > label {
                display: block;
                width: auto;
                margin-bottom: 7px;
            }

            .required-text {
                display: inline-block;
                margin-top: 5px;
            }
        }
    </style>
</head>

<body>
    <div class="signup-container">

        <header>
            <h1>&#128100; 회원가입</h1>
            <p>SKALA-FRONT 회원가입을 환영합니다.</p>
        </header>

        <main>
            <form action="signUpResult.html" method="get">

                <section>
                    <fieldset>
                        <legend>계정 정보</legend>

                        <div class="form-row">
                            <label for="userId">아이디</label>

                            <input
                                type="text"
                                id="userId"
                                name="userId"
                                placeholder="4~15자 영문/숫자"
                                minlength="4"
                                maxlength="15"
                                required
                            >

                            <span class="required-text">(필수)</span>
                        </div>

                        <div class="form-row">
                            <label for="password">비밀번호</label>

                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="8자 이상 입력"
                                minlength="8"
                                required
                            >

                            <span class="required-text">(필수)</span>
                        </div>

                        <div class="form-row">
                            <label for="email">이메일</label>

                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="example@email.com"
                                required
                            >

                            <span class="required-text">(필수)</span>
                        </div>
                    </fieldset>
                </section>

                <section>
                    <fieldset>
                        <legend>개인 프로필 정보</legend>

                        <div class="form-row">
                            <label for="name">이름</label>

                            <input
                                type="text"
                                id="name"
                                name="name"
                                placeholder="이름을 입력하세요"
                                required
                            >
                        </div>

                        <div class="form-row">
                            <label for="birth">생년월일</label>

                            <input
                                type="date"
                                id="birth"
                                name="birth"
                            >
                        </div>

                        <div class="form-row">
                            <span style="width: 130px; font-weight: bold;">성별</span>

                            <div class="inline-group">
                                <label>
                                    <input
                                        type="radio"
                                        name="gender"
                                        value="male"
                                    >
                                    남성
                                </label>

                                <label>
                                    <input
                                        type="radio"
                                        name="gender"
                                        value="female"
                                    >
                                    여성
                                </label>

                                <label>
                                    <input
                                        type="radio"
                                        name="gender"
                                        value="none"
                                        checked
                                    >
                                    선택 안 함
                                </label>
                            </div>
                        </div>

                        <div class="form-row">
                            <span style="width: 130px; font-weight: bold;">관심 분야</span>

                            <div class="checkbox-group">
                                <label>
                                    <input
                                        type="checkbox"
                                        name="interest"
                                        value="frontend"
                                    >
                                    웹 프론트엔드
                                </label>

                                <label>
                                    <input
                                        type="checkbox"
                                        name="interest"
                                        value="uiux"
                                    >
                                    UI/UX 디자인 표준
                                </label>

                                <label>
                                    <input
                                        type="checkbox"
                                        name="interest"
                                        value="bigdata"
                                    >
                                    빅데이터 &amp; 데이터베이스
                                </label>

                                <label>
                                    <input
                                        type="checkbox"
                                        name="interest"
                                        value="cloud"
                                    >
                                    클라우드 &amp; 인프라
                                </label>
                            </div>
                        </div>

                        <div class="form-row">
                            <label for="path">가입 경로</label>

                            <select id="path" name="path" required>
                                <option value="">선택해 주세요</option>
                                <option value="search">검색</option>
                                <option value="friend">지인 추천</option>
                                <option value="sns">SNS</option>
                                <option value="school">학교 또는 교육기관</option>
                                <option value="etc">기타</option>
                            </select>
                        </div>
                    </fieldset>
                </section>

                <section>
                    <fieldset>
                        <legend>자기소개</legend>

                        <div class="form-row">
                            <label for="introduction">나를 표현하는 <br> 한 줄 소개</label>

                            <textarea
                                id="introduction"
                                name="introduction"
                                placeholder="여기에 나를 소개하는 내용을 작성해 주세요."
                                maxlength="300"
                            ></textarea>
                        </div>
                    </fieldset>
                </section>

                <section class="button-area">
                    <input type="submit" value="회원가입">
                    <input type="reset" value="다시 작성">
                </section>

            </form>
        </main>

        <footer>
            <p><a href="index.html">나가기</a></p>
        </footer>

    </div>
</body>
</html>
