<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[실습]나의 휴일 일과</title>
    <style>
        #board {
            display:flex;
            justify-content:space-evenly;
        }
        table {
            border-collapse: collapse;
            text-align: center;
        }
        
        thead {
            background-color:#ffebae;
            border:1px solid gray;
            padding:10px;
        }

        th {
            border:1px solid gray; 
            padding:10px;
        }

        td {
            border:1px solid gray; 
            padding:10px;    
        }

        th:first-child,
        td:first-child{
            width:80px;
        }

        th:last-child,
        td:last-child{
            width:200px;
        }
        
        h2 {
            font-weight: bold;
        }

        p{
            padding-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="padding-left: 50px;">&#127881; 나의 휴일 일과</h1>
    <hr>
    <br>

    <div id="board">
        <div>
            <h2>&#127749; <ins>아침</ins></h2>
            <table>
                <thead>
                    <tr>
                        <th class="time">시간</th>

                    </tr>
                </thead>

                    <tr>

                    </tr>
                </tbody>

        </div>

        <div>
            <h2>&#127774; <ins>낮</ins></h2>

                <thead>
                    <tr>
                        <th>시간</th>

                    <tr>

                    <tr>
                        <td>17:00</td>
                        <td>&#127795; 산뜻한 <strong>산책</strong></td>
                    </tr>
                </tbody>
            </table>
        </div>
        

        <div>

        <table>
            <thead>
                <tr>
                    <th>시간</th>

                </tr>
            </thead>

                <tr>

    <br>
    <div>
        <p>
            &#128205; 휴일에는 늦잠도 자고, 맛있는 음식을 먹으며 여유로운 하루를 보내는 것을 좋아합니다.<br>
